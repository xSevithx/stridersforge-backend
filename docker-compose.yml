version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: striderforge-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - card-images:/app/data/card-images
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - striderforge-network

  db:
    image: postgres:15-alpine
    container_name: striderforge-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-striderforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-striderforge}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-striderforge} -d ${POSTGRES_DB:-striderforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - striderforge-network

volumes:
  postgres-data:
  card-images:
  uploads:

networks:
  striderforge-network:
    driver: bridge

